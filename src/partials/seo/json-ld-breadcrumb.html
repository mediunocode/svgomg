{% if breadcrumbList | length %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {% for item in breadcrumbList %}
    {
      "@type": "ListItem",
      "position": {{ loop.index }},
      "name": "{{ item.name|e }}",
      "item": "{{ item.url|e }}"
    }{% if not loop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
{% endif %}
