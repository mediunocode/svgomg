{% if faqItems | length %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in faqItems %}
    {
      "@type": "Question",
      "name": "{{ item.question|e }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ item.answer|e }}"
      }
    }{% if not loop.last %},{% endif %}
    {% endfor %}
  ]
}
</script>
{% endif %}
